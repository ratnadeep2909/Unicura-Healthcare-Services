<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniCura Doctor Login</title>
  <link rel="icon" type="image/x-icon" href="./favicon.png">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #123f43 0%, #071b1c 60%);
      color: #eff8f8;
    }
    .card {
      width: min(92vw, 440px);
      background: rgba(12, 46, 48, 0.96);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
    }
    h1 { margin-top: 0; }
    p { color: #aac9ca; }
    input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #0a2628;
      color: #eff8f8;
      margin-bottom: 14px;
      box-sizing: border-box;
    }
    button, a {
      display: inline-block;
      text-decoration: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
    }
    button {
      width: 100%;
      background: #3fbcc0;
      color: #042528;
    }
    .home-link {
      margin-top: 14px;
      color: #eff8f8;
      border: 1px solid rgba(255,255,255,0.12);
      text-align: center;
      width: calc(100% - 2px);
    }
    #message { margin-top: 14px; min-height: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Doctor Portal</h1>
    <p>Sign in to view patient appointments, chat, and consultation links.</p>
    <form id="doctorLoginForm">
      <input id="doctorEmail" type="email" placeholder="Doctor email" required>
      <input id="doctorPassword" type="password" placeholder="Password" required>
      <button type="submit">Doctor Login</button>
    </form>
    <div id="message"></div>
    <a class="home-link" href="/index.html">Back to Home</a>
  </div>

  <script>
    document.getElementById('doctorLoginForm').addEventListener('submit', async function(event) {
      event.preventDefault();
      const message = document.getElementById('message');

      try {
        const response = await fetch('/api/doctors/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('doctorEmail').value.trim(),
            password: document.getElementById('doctorPassword').value
          })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || 'Doctor login failed.');
        }

        localStorage.setItem('unicuraDoctorAuth', data.token);
        localStorage.setItem('unicuraDoctor', JSON.stringify(data.doctor));
        message.textContent = data.message;
        setTimeout(() => {
          window.location.href = '/doctor-dashboard.html';
        }, 700);
      } catch (error) {
        message.textContent = error.message;
      }
    });
  </script>
<script src="/js/site-api.js" defer></script>
</body>
</html>
