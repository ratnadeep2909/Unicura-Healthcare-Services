<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniCura Doctor Dashboard</title>
  <link rel="icon" type="image/x-icon" href="./favicon.png">
  <style>
    :root {
      --bg: #081b1c;
      --panel: #103234;
      --panel-soft: #173f42;
      --accent: #3fbcc0;
      --text: #eef8f8;
      --muted: #a9cbcc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f2f31 0%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 44px;
    }
    .topbar, .hero, .card {
      background: rgba(16,50,52,0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .brand { font-size: 26px; font-weight: 700; }
    .btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: var(--accent);
      color: #042528;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      display: inline-block;
    }
    .btn.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .muted { color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .appointment {
      background: var(--panel-soft);
      border-radius: 18px;
      padding: 18px;
    }
    .appointment p { margin: 8px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">UniCura Doctor Dashboard</div>
      <div>
        <a class="btn secondary" href="/index.html">Home</a>
        <button class="btn secondary" id="logoutButton" type="button">Log Out</button>
      </div>
    </div>

    <section class="hero">
      <h1 id="doctorTitle">Welcome</h1>
      <p class="muted" id="doctorMeta">Loading doctor profile...</p>
    </section>

    <section class="card">
      <h2>Your Appointments</h2>
      <div id="appointmentsContainer" class="grid"></div>
    </section>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      const storedDoctor = localStorage.getItem('unicuraDoctor');
      const doctorTitle = document.getElementById('doctorTitle');
      const doctorMeta = document.getElementById('doctorMeta');
      const appointmentsContainer = document.getElementById('appointmentsContainer');
      const logoutButton = document.getElementById('logoutButton');

      if (!storedDoctor) {
        window.location.href = '/doctor-login.html';
        return;
      }

      const doctor = JSON.parse(storedDoctor);
      doctorTitle.textContent = `Welcome, ${doctor.name}`;
      doctorMeta.textContent = `${doctor.specialization} | ${doctor.email}`;

      logoutButton.addEventListener('click', function() {
        localStorage.removeItem('unicuraDoctorAuth');
        localStorage.removeItem('unicuraDoctor');
        window.location.href = '/doctor-login.html';
      });

      try {
        const response = await fetch(`/api/doctors/appointments?email=${encodeURIComponent(doctor.email)}`);
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || 'Unable to load appointments.');
        }

        appointmentsContainer.innerHTML = data.appointments.length
          ? data.appointments.map((appointment) => `
              <article class="appointment">
                <p><strong>Patient:</strong> ${appointment.fullName}</p>
                <p><strong>Email:</strong> ${appointment.email}</p>
                <p><strong>Phone:</strong> ${appointment.phone}</p>
                <p><strong>Date:</strong> ${appointment.appointmentDate}</p>
                <p><strong>Time:</strong> ${appointment.timeSlot}</p>
                <p><strong>Reason:</strong> ${appointment.reason}</p>
                ${appointment.consultationLink ? `<p><a class="btn" href="${appointment.consultationLink}" target="_blank" rel="noopener noreferrer">Join Video Room</a></p>` : ''}
                ${appointment.chatLink ? `<p><a class="btn secondary" href="${appointment.chatLink}">Open Chat Room</a></p>` : ''}
              </article>
            `).join('')
          : '<div class="appointment"><p class="muted">No appointments assigned to this doctor yet.</p></div>';
      } catch (error) {
        appointmentsContainer.innerHTML = `<div class="appointment"><p class="muted">${error.message}</p></div>`;
      }
    });
  </script>
<script src="/js/site-api.js" defer></script>
</body>
</html>
