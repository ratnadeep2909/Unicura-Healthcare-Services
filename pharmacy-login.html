<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniCura Pharmacy Login</title>
  <link rel="icon" type="image/x-icon" href="./favicon.png">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #13414a 0%, #07161b 64%);
      color: #f2fbfb;
    }
    .card {
      width: min(92vw, 450px);
      background: rgba(11, 39, 44, 0.96);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 26px 50px rgba(0,0,0,0.28);
    }
    h1 { margin-top: 0; margin-bottom: 10px; }
    p { color: #b9d6d9; }
    input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #0a2327;
      color: #f2fbfb;
      margin-bottom: 14px;
      box-sizing: border-box;
    }
    button, a {
      display: inline-block;
      text-decoration: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
    }
    button {
      width: 100%;
      background: #64d1b8;
      color: #032b26;
    }
    .secondary {
      margin-top: 14px;
      color: #f2fbfb;
      border: 1px solid rgba(255,255,255,0.14);
      text-align: center;
      width: calc(100% - 2px);
    }
    #message { margin-top: 14px; min-height: 20px; }
    .hint {
      margin-top: 16px;
      padding: 14px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      color: #cfe6e6;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Pharmacy Portal</h1>
    <p>Sign in to accept prescription orders and update delivery status.</p>
    <form id="pharmacyLoginForm">
      <input id="pharmacyEmail" type="email" placeholder="Pharmacy email" required>
      <input id="pharmacyPassword" type="password" placeholder="Password" required>
      <button type="submit">Pharmacy Login</button>
    </form>
    <div id="message"></div>
    <div class="hint">
      Default seeded pharmacy password: <strong>Pharmacy123!</strong>
    </div>
    <a class="secondary" href="/index.html">Back to Home</a>
  </div>

  <script>
    document.getElementById("pharmacyLoginForm").addEventListener("submit", async function(event) {
      event.preventDefault();
      const message = document.getElementById("message");

      try {
        const response = await fetch("/api/pharmacies/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("pharmacyEmail").value.trim(),
            password: document.getElementById("pharmacyPassword").value
          })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || "Pharmacy login failed.");
        }

        localStorage.setItem("unicuraPharmacyAuth", data.token);
        localStorage.setItem("unicuraPharmacy", JSON.stringify(data.pharmacy));
        message.textContent = data.message;
        setTimeout(() => {
          window.location.href = "/pharmacy-dashboard.html";
        }, 700);
      } catch (error) {
        message.textContent = error.message;
      }
    });
  </script>
<script src="/js/site-api.js" defer></script>
</body>
</html>
