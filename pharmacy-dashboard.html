<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniCura Pharmacy Dashboard</title>
  <link rel="icon" type="image/x-icon" href="./favicon.png">
  <style>
    :root {
      --bg: #07161b;
      --panel: rgba(15, 42, 49, 0.96);
      --panel-soft: #143d46;
      --accent: #64d1b8;
      --text: #eff8f8;
      --muted: #a9c8cb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #123942 0%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 1220px;
      margin: 0 auto;
      padding: 28px 20px 44px;
    }
    .topbar, .hero, .card {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .brand {
      font-size: 28px;
      font-weight: 700;
    }
    .muted { color: var(--muted); }
    .btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: var(--accent);
      color: #06322b;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      display: inline-block;
    }
    .btn.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
    }
    .order {
      background: var(--panel-soft);
      border-radius: 18px;
      padding: 18px;
    }
    .order p {
      margin: 8px 0;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(100, 209, 184, 0.16);
      color: #bff5e6;
      font-size: 13px;
      font-weight: 700;
    }
    .status-controls {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }
    select, input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.18);
      color: var(--text);
    }
    .prescription-preview {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">UniCura Pharmacy Dashboard</div>
      <div>
        <a class="btn secondary" href="/index.html">Home</a>
        <button class="btn secondary" id="logoutButton" type="button">Log Out</button>
      </div>
    </div>

    <section class="hero">
      <h1 id="pharmacyTitle">Welcome</h1>
      <p class="muted" id="pharmacyMeta">Loading pharmacy profile...</p>
    </section>

    <section class="card">
      <h2>Prescription Orders</h2>
      <div id="ordersContainer" class="grid"></div>
    </section>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async function() {
      const storedPharmacy = localStorage.getItem("unicuraPharmacy");
      const pharmacyTitle = document.getElementById("pharmacyTitle");
      const pharmacyMeta = document.getElementById("pharmacyMeta");
      const ordersContainer = document.getElementById("ordersContainer");
      const logoutButton = document.getElementById("logoutButton");

      if (!storedPharmacy) {
        window.location.href = "/pharmacy-login.html";
        return;
      }

      const pharmacy = JSON.parse(storedPharmacy);
      pharmacyTitle.textContent = `Welcome, ${pharmacy.name}`;
      pharmacyMeta.textContent = `${pharmacy.address}, ${pharmacy.city} | ${pharmacy.email}`;

      logoutButton.addEventListener("click", function() {
        localStorage.removeItem("unicuraPharmacyAuth");
        localStorage.removeItem("unicuraPharmacy");
        window.location.href = "/pharmacy-login.html";
      });

      async function loadOrders() {
        try {
          const response = await fetch(`/api/pharmacies/orders?email=${encodeURIComponent(pharmacy.email)}`);
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.message || "Unable to load pharmacy orders.");
          }

          ordersContainer.innerHTML = data.orders.length
            ? data.orders.map((order) => `
                <article class="order">
                  <p><strong>Customer:</strong> ${order.fullName}</p>
                  <p><strong>Mobile:</strong> ${order.mobileNumber}</p>
                  <p><strong>Address:</strong> ${order.address}${order.city ? `, ${order.city}` : ""}</p>
                  <p><strong>Notes:</strong> ${order.notes || "No extra notes added."}</p>
                  <p><strong>Order ID:</strong> ${order.id}</p>
                  <p><strong>Placed On:</strong> ${new Date(order.createdAt).toLocaleString()}</p>
                  <p><span class="status-pill">${order.status}</span></p>
                  ${order.prescriptionImage ? `<img class="prescription-preview" src="${order.prescriptionImage}" alt="Prescription image">` : ""}
                  <div class="status-controls">
                    <select class="status-select" data-order-id="${order.id}">
                      ${["Order received","Accepted","Preparing medicines","Out for delivery","Delivered","Cancelled"].map((status) => `<option value="${status}" ${order.status === status ? "selected" : ""}>${status}</option>`).join("")}
                    </select>
                    <input class="delivery-input" data-order-id="${order.id}" type="text" value="${order.estimatedDelivery || "Within 90 minutes"}" placeholder="Estimated delivery">
                    <button class="btn update-status-btn" type="button" data-order-id="${order.id}">Update Status</button>
                  </div>
                </article>
              `).join("")
            : '<div class="order"><p class="muted">No prescription orders assigned to this pharmacy yet.</p></div>';

          attachStatusHandlers();
        } catch (error) {
          ordersContainer.innerHTML = `<div class="order"><p class="muted">${error.message}</p></div>`;
        }
      }

      function attachStatusHandlers() {
        document.querySelectorAll(".update-status-btn").forEach((button) => {
          button.addEventListener("click", async function() {
            const orderId = button.dataset.orderId;
            const status = document.querySelector(`.status-select[data-order-id="${orderId}"]`).value;
            const estimatedDelivery = document.querySelector(`.delivery-input[data-order-id="${orderId}"]`).value.trim();

            try {
              const response = await fetch("/api/pharmacy-orders/status", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ orderId, status, estimatedDelivery })
              });

              const data = await response.json();
              if (!response.ok) {
                throw new Error(data.message || "Unable to update order status.");
              }

              await loadOrders();
            } catch (error) {
              alert(error.message);
            }
          });
        });
      }

      await loadOrders();
    });
  </script>
<script src="/js/site-api.js" defer></script>
</body>
</html>
